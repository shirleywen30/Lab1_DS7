<html>
<head>
    <title>Formulario de entrada del dato</title>
</head>

<body>

    <form method="post" action="problema5.php">
        <!-- Campo para ingresar el nombre -->
        Ingrese su nombre:
        <input type="text" name="nombre" id="nombre">

        <!-- Campo para ingresar la edad -->
        Ingrese su Edad:

</body>
</html>
